<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reportes — Erika Zambrano</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #01696f;
      --accent-light: rgba(1, 105, 111, 0.1);
      --bg: #f7f6f2;
      --white: #ffffff;
      --text: #3a3a3a;
      --heading: #1a1a1a;
      --muted: #777;
      --border: #e8e7e3;
      --max-width: 800px;
    }

    html { font-size: 16px; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Topbar ── */
    .topbar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-inner {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 4px;
      height: 48px;
    }

    .topbar-link {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--muted);
      padding: 6px 12px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      text-decoration: none;
    }

    .topbar-link:hover {
      color: var(--accent);
      background: var(--accent-light);
      text-decoration: none;
    }

    .topbar-link.active {
      color: var(--accent);
      background: var(--accent-light);
    }

    .topbar-spacer { flex: 1; }

    .lang-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--white);
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.04em;
      opacity: 0.4;
      cursor: default;
    }

    .lang-btn svg { width: 12px; height: 12px; }

    /* ── Content ── */
    .container {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 80px 24px;
      text-align: center;
    }

    .page-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }

    .page-title {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(1.8rem, 5vw, 2.5rem);
      color: var(--heading);
      margin-bottom: 16px;
    }

    .page-desc {
      font-size: 0.975rem;
      color: var(--muted);
      max-width: 420px;
      margin: 0 auto;
    }
  </style>
</head>
<body>

  <nav class="topbar" aria-label="Main navigation" data-testid="topbar">
    <div class="topbar-inner">
      <a href="index.html" class="topbar-link" data-testid="nav-home">Home</a>
      <a href="cv.html" class="topbar-link" data-testid="nav-cv">CV</a>
      <a href="contact.html" class="topbar-link" data-testid="nav-contact">Contacto</a>
      <a href="reports.html" class="topbar-link active" data-testid="nav-reports">Reportes</a>
      <div class="topbar-spacer"></div>
      <button class="lang-btn" disabled aria-disabled="true" title="Disponible en la página CV">
        <span>ES</span>
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M2 4l4 4 4-4"/>
        </svg>
      </button>
    </div>
  </nav>

  <div class="container">
    <p class="page-label">Reportes</p>
    <h1 class="page-title">Próximamente</h1>
    <p class="page-desc">Esta sección está en construcción.</p>
  </div>

</body>
</html>
